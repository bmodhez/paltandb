<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#f9fafb;color:#111827;-webkit-font-smoothing:antialiased}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f3f4f6}
::-webkit-scrollbar-thumb{background:#16a34a;border-radius:4px}

/* ─ Fonts ─ */
.font-syne{font-family:'Syne',sans-serif}
.font-serif{font-family:'DM Serif Display',serif}

/* ─ Top announcement bar ─ */
.announce-bar{background:linear-gradient(90deg,#14532d,#15803d,#16a34a,#15803d,#14532d);background-size:300% 100%;animation:shift 6s linear infinite}
@keyframes shift{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ─ Navbar ─ */
.navbar{background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:90}

/* ─ Search ─ */
.search-box{background:#f3f4f6;border:2px solid transparent;border-radius:14px;transition:all .25s}
.search-box:focus-within{background:#fff;border-color:#16a34a;box-shadow:0 0 0 4px rgba(22,163,74,.1)}

/* ─ Hero ─ */
.hero-section{background-image:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('./hero.jpeg');background-size:cover;background-position:center;position:relative;overflow:hidden;background-color:#052e16}
.hero-section::after{content:'';position:absolute;inset:0;background:linear-gradient(to right, rgba(0,0,0,0.7) 0%, transparent 100%);z-index:1;pointer-events:none}
.hero-dots{background-image:radial-gradient(rgba(255,255,255,.12) 1px,transparent 1px);background-size:28px 28px}

/* ─ Category pills ─ */
.cat-scroll{overflow-x:auto;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cpill{border-radius:100px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;font-size:13px;font-weight:600;transition:all .2s;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.cpill:hover{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
.cpill.active{background:#16a34a;color:#fff;border-color:#16a34a;box-shadow:0 4px 14px rgba(22,163,74,.35)}

/* ─ Product card ─ */
.pcard{background:#fff;border-radius:20px;border:1.5px solid #f3f4f6;transition:all .3s cubic-bezier(.34,1.56,.64,1);overflow:hidden;display:flex;flex-direction:column}
.pcard:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,.11);border-color:#e5e7eb}
.pcard-img{background:linear-gradient(135deg,#f9fafb,#f3f4f6);transition:background .3s}
.pcard:hover .pcard-img{background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.add-btn{border:2px solid #16a34a;color:#16a34a;background:#fff;border-radius:10px;font-weight:700;font-size:13px;transition:all .2s;cursor:pointer;font-family:'DM Sans',sans-serif}
.add-btn:hover{background:#16a34a;color:#fff;box-shadow:0 4px 12px rgba(22,163,74,.35)}
.qty-box{background:#16a34a;border-radius:10px;display:flex;align-items:center;gap:8px;padding:5px 10px}
.qty-btn{color:#fff;font-weight:800;font-size:16px;cursor:pointer;line-height:1;width:18px;text-align:center;background:none;border:none}
.qty-num{color:#fff;font-weight:700;font-size:14px;min-width:18px;text-align:center}

/* ─ Tags ─ */
.tag{font-size:10px;font-weight:700;border-radius:100px;padding:3px 9px}
.tag-new{background:#d1fae5;color:#065f46}
.tag-hot{background:#fee2e2;color:#991b1b}
.tag-sale{background:#fef3c7;color:#92400e}
.tag-best{background:#ede9fe;color:#5b21b6}

/* ─ Offer cards ─ */
.offer-card{border-radius:20px;border:1.5px solid;transition:all .3s}
.offer-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.1)}

/* ─ Cart drawer ─ */
.drawer{position:fixed;top:0;right:0;height:100vh;width:400px;background:#fff;box-shadow:-12px 0 48px rgba(0,0,0,.14);z-index:200;transform:translateX(110%);transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:all}

/* ─ Modal ─ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:28px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.2)}

/* ─ Location dropdown ─ */
.loc-drop{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.14);border:1.5px solid #e5e7eb;min-width:280px;z-index:100}

/* ─ Notification panel ─ */
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.14);border:1.5px solid #e5e7eb;width:320px;z-index:100}

/* ─ Profile dropdown ─ */
.prof-drop{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.14);border:1.5px solid #e5e7eb;width:220px;z-index:100;overflow:hidden}

/* ─ Section underline ─ */
.sec-line{display:inline-block}
.sec-line::after{content:'';display:block;width:36px;height:3px;background:linear-gradient(90deg,#16a34a,#86efac);border-radius:2px;margin-top:5px}

/* ─ Banner ─ */
.promo-card{border-radius:24px;overflow:hidden;position:relative;transition:transform .3s}
.promo-card:hover{transform:scale(1.015)}

/* ─ Pulse dot ─ */
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
.pdot{animation:pdot 1.8s ease infinite}

/* ─ Fade up ─ */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .5s ease both}
.fu1{animation-delay:.05s}.fu2{animation-delay:.1s}.fu3{animation-delay:.15s}.fu4{animation-delay:.2s}.fu5{animation-delay:.25s}.fu6{animation-delay:.3s}

/* ─ Coupon dashed ─ */
.coupon-box{border:2px dashed #16a34a;border-radius:12px;background:#f0fdf4}

/* ─ Footer ─ */
.footer-bg{background:#0a0a0a}

/* ─ Discount badge ─ */
.disc{background:#16a34a;color:#fff;font-size:10px;font-weight:800;border-radius:100px;padding:2px 8px}

/* ─ Search suggestions ─ */
.suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.12);border:1.5px solid #e5e7eb;z-index:50;overflow:hidden}
.sugg-item:hover{background:#f0fdf4}

/* ─ Grid ─ */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px}
@media(max-width:900px){.pgrid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(max-width:500px){.pgrid{grid-template-columns:repeat(2,1fr);gap:10px}}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111827;color:#fff;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;z-index:999;transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .4s;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>

/* ════ STARS ════ */
function Stars({r}) {

    <svg width={11} height={11} viewBox="0 0 24 24" fill="#fbbf24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>

/* ════ PRODUCT CARD ════ */
function ProductCard({p, qty, onUpdate}) {
  const disc = p.mrp > p.price ? Math.round((1-p.price/p.mrp)*100) : 0;
  return (
    <div className="pcard">
      <div className="pcard-img" style={{height:130,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
        <span style={{fontSize:58}}>{p.img}</span>
        {p.tag && <span className={`tag ${TAG_STYLE[p.tag]}`} style={{position:'absolute',top:10,left:10}}>{TAG_LABEL[p.tag]}</span>}
        {disc>0 && <span className="disc" style={{position:'absolute',top:10,right:10}}>-{disc}%</span>}
      </div>
      <div style={{padding:'14px',display:'flex',flexDirection:'column',flex:1}}>
        <div style={{fontSize:11,color:'#9ca3af',fontWeight:600,marginBottom:2}}>{p.brand}</div>
        <div style={{fontSize:13,fontWeight:700,color:'#111827',lineHeight:1.35,marginBottom:4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',flex:1}}>{p.name}</div>
        <div style={{fontSize:11,color:'#9ca3af',marginBottom:6}}>{p.weight}</div>
        <Stars r={p.rating}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10}}>
          <div>
            <span style={{fontSize:16,fontWeight:800,color:'#111827'}}>₹{p.price}</span>
            {disc>0 && <span style={{fontSize:11,color:'#9ca3af',textDecoration:'line-through',marginLeft:6}}>₹{p.mrp}</span>}
          </div>
          {qty===0
            ? <button className="add-btn" style={{padding:'6px 14px'}} onClick={()=>{onUpdate(p.id,1);showToast(`${p.name.split(' ')[0]} added to kart`)}}>+ Add</button>
            : <div className="qty-box"><button className="qty-btn" onClick={()=>onUpdate(p.id,-1)}>−</button><span className="qty-num">{qty}</span><button className="qty-btn" onClick={()=>onUpdate(p.id,1)}>+</button></div>
          }
        </div>
      </div>
    </div>
  );
}

/* ════ CART DRAWER ════ */
function CartDrawer({open, onClose, cart, onUpdate, user, onLoginRequest}) {
  const items = useMemo(() => PRODUCTS.filter(p=>cart[p.id]>0), [cart]);
  const total = items.reduce((s,p)=>s+p.price*(cart[p.id]||0),0);
  const saved = items.reduce((s,p)=>s+(p.mrp-p.price)*(cart[p.id]||0),0);
  const count = items.reduce((s,p)=>s+(cart[p.id]||0),0);
  const [coupon, setCoupon] = useState('');
  const [couponApplied, setCouponApplied] = useState(false);
  const discount = couponApplied ? Math.round(total*0.1) : 0;

  return (
    <>
      <div className={`drawer-overlay ${open?'open':''}`} onClick={onClose}/>
      <div className={`drawer ${open?'open':''}`}>
        {/* Header */}
        <div style={{padding:'20px 24px',borderBottom:'1px solid #f3f4f6',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div className="font-syne" style={{fontSize:18,fontWeight:700,color:'#111827'}}>Your Kart 🛒</div>
            <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>{count} item{count!==1?'s':''} · ₹{total-discount} payable</div>
          </div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:'50%',background:'#f3f4f6',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background='#e5e7eb'} onMouseLeave={e=>e.currentTarget.style.background='#f3f4f6'}>
            <Ic d={icons.x} size={16}/>
          </button>
        </div>

        {items.length===0 ? (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
            <span style={{fontSize:72,marginBottom:16}}>🛒</span>
            <div className="font-syne" style={{fontSize:18,fontWeight:700,color:'#374151',marginBottom:8}}>Your kart is empty</div>
            <div style={{fontSize:13,color:'#9ca3af',marginBottom:24}}>Add items from the store to start shopping</div>
            <button onClick={onClose} style={{background:'#16a34a',color:'#fff',border:'none',borderRadius:12,padding:'12px 28px',fontSize:14,fontWeight:700,fontFamily:'DM Sans',cursor:'pointer'}}>Browse Products</button>
          </div>
        ) : (
          <>
            {/* Delivery strip */}
            <div style={{margin:'16px 24px 0',background:'#f0fdf4',borderRadius:12,padding:'10px 14px',display:'flex',alignItems:'center',gap:10,border:'1px solid #bbf7d0'}}>
              <span style={{fontSize:18}}>⚡</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'#15803d'}}>Delivery in ~10 minutes</div>
                <div style={{fontSize:11,color:'#16a34a'}}>Express delivery · Aurangabad</div>
              </div>
            </div>
            {/* Items */}
            <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
              {items.map(p=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:14,paddingBottom:16,marginBottom:16,borderBottom:'1px solid #f9fafb'}}>
                  <div style={{width:56,height:56,background:'#f3f4f6',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{p.img}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#111827',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                    <div style={{fontSize:11,color:'#9ca3af'}}>{p.weight}</div>
                    <div style={{fontSize:14,fontWeight:800,color:'#16a34a',marginTop:2}}>₹{p.price}
                      {p.mrp>p.price&&<span style={{fontSize:11,color:'#9ca3af',textDecoration:'line-through',fontWeight:400,marginLeft:6}}>₹{p.mrp}</span>}
                    </div>
                  </div>
                  <div className="qty-box" style={{flexShrink:0}}>
                    <button className="qty-btn" onClick={()=>onUpdate(p.id,-1)}>−</button>
                    <span className="qty-num">{cart[p.id]}</span>
                    <button className="qty-btn" onClick={()=>onUpdate(p.id,1)}>+</button>
                  </div>
                </div>
              ))}
            </div>
            {/* Coupon */}
            <div style={{padding:'0 24px 16px'}}>
              <div className="coupon-box" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
                <span style={{fontSize:16}}>🏷️</span>
                <input value={coupon} onChange={e=>setCoupon(e.target.value)} placeholder="Enter coupon code" style={{flex:1,background:'none',border:'none',outline:'none',fontSize:13,fontFamily:'DM Sans',color:'#374151'}}/>

                  {couponApplied ? '✓' : 'Apply'}
                </button>
              </div>
            </div>
            {/* Bill */}
            <div style={{padding:'0 24px',borderTop:'1px solid #f3f4f6',paddingTop:16}}>
              {[['Subtotal',`₹${total}`],['Delivery','FREE'],saved>0?['You save 🎉',`−₹${saved}`]:null,couponApplied?['Coupon PALTAN100',`−₹${discount}`]:null,['Total to pay',`₹${total-discount}`]].filter(Boolean).map(([k,v],i,arr)=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:i===arr.length-1?15:13,fontWeight:i===arr.length-1?800:400,color:k.includes('save')||k.includes('Coupon')?'#16a34a':i===arr.length-1?'#111827':'#6b7280',paddingTop:i===arr.length-1?10:0,borderTop:i===arr.length-1?'1px solid #e5e7eb':0}}>
                  <span>{k}</span><span>{v}</span>
                </div>
              ))}
            </div>
            {/* Checkout */}
            <div style={{padding:'16px 24px 24px'}}>
              <button onClick={()=>{if(!user){onClose();onLoginRequest();}else showToast('Proceeding to checkout...');}} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#15803d,#22c55e)',color:'#fff',border:'none',borderRadius:14,fontSize:15,fontWeight:700,fontFamily:'DM Sans',cursor:'pointer',boxShadow:'0 8px 24px rgba(22,163,74,.35)',display:'flex',alignItems:'center',justifyContent:'space-between',paddingLeft:20,paddingRight:20}}>
                <span>{user ? 'Proceed to Checkout' : 'Login to Checkout'}</span>
                <span>₹{total-discount} →</span>
              </button>
            </div>
          </>
        )}
      </div>
    </>
  );
}

          <div style={{borderTop:'1px solid #1f2937',paddingTop:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <p style={{color:'#4b5563',fontSize:12}}>© 2026 Paltan Shopping Mall, Aurangabad. All rights reserved.</p>
            <p style={{color:'#4b5563',fontSize:12}}>Made with ❤️ in Marathwada · paltanshoppingmall.in</p>
          </div>
        </div>
      </footer>

      {/* ── Modals & Drawers ── */}
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart} onUpdate={updateCart} user={user} onLoginRequest={()=>setLoginOpen(true)}/>
      {loginOpen && <LoginModal onClose={()=>setLoginOpen(false)} onLogin={setUser}/>}

      {/* ── Floating cart bar (shows when items in cart) ── */}
      {cartCount>0 && !cartOpen && (
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:80}}>
          <button onClick={()=>setCartOpen(true)} className="float-cart" style={{display:'flex',alignItems:'center',gap:16,background:'linear-gradient(135deg,#15803d,#22c55e)',color:'#fff',border:'none',borderRadius:20,padding:'14px 28px',cursor:'pointer',boxShadow:'0 12px 40px rgba(22,163,74,.5)',fontFamily:'DM Sans',transition:'all .3s'}} onMouseEnter={e=>e.currentTarget.style.transform='scale(1.03)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
            <div style={{background:'rgba(255,255,255,.2)',borderRadius:12,padding:'5px 12px'}}>
              <span style={{fontWeight:800,fontSize:14}}>{cartCount} items</span>
            </div>
            <span style={{fontWeight:700,fontSize:15}}>View Kart</span>
            <span style={{fontWeight:800,fontSize:15}}>₹{cartTotal} →</span>
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
